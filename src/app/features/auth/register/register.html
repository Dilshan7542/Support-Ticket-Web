<section class="card shadow-sm border-0 w-100 auth-card">
  <div class="card-body p-4">
    <h2 class="h4 mb-4">Register</h2>

    <form class="vstack gap-3" [formGroup]="form" (ngSubmit)="submit()">
      <input class="form-control" formControlName="name" placeholder="Name" />
      <input class="form-control" type="email" formControlName="email" placeholder="Email" />
      <input class="form-control" type="password" formControlName="password" placeholder="Password" />
      <button class="btn btn-primary" type="submit" [disabled]="form.invalid || store.loading()">Create</button>
    </form>

    <a class="d-inline-block mt-3" routerLink="/auth/login">Back to login</a>
  </div>
</section>
