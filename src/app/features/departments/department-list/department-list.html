<header class="mb-4">
  <h2 class="h3 mb-1">Departments</h2>
  <p class="app-muted mb-0">Create, update, and remove support departments.</p>
</header>

<section class="department-grid">
  <form class="card border-0 shadow-sm" [formGroup]="form" (ngSubmit)="create()">
    <div class="card-body vstack gap-3">
      <h3 class="h5 mb-0">Add Department</h3>
      <input class="form-control" formControlName="name" placeholder="Department name" />
      <textarea class="form-control" formControlName="description" rows="4" placeholder="Description"></textarea>
      <select class="form-select" formControlName="status">
        <option value="ACTIVE">Active</option>
        <option value="INACTIVE">Inactive</option>
      </select>
      <button class="btn btn-primary align-self-start" type="submit" [disabled]="form.invalid">Create</button>
    </div>
  </form>

  <div class="list-group shadow-sm">
    @for (department of store.departments(); track department.id) {
      <a class="list-group-item list-group-item-action d-flex align-items-center justify-content-between gap-3" [routerLink]="['/departments', department.id]">
        <div>
          <strong>{{ department.name }}</strong>
          <div class="app-muted small">{{ department.description || 'No description' }} | {{ department.status || 'ACTIVE' }}</div>
        </div>
        <button class="btn btn-outline-danger btn-sm" type="button" (click)="delete(department.id, $event)">Delete</button>
      </a>
    } @empty {
      <div class="list-group-item">No departments found.</div>
    }
  </div>
</section>
