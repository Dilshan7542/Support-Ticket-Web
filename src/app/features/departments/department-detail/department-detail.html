<header class="mb-4">
  <h2 class="h3 mb-1">Department Detail</h2>
  <p class="app-muted mb-0">Update or delete this department.</p>
</header>

@if (department(); as selectedDepartment) {
  <form class="card border-0 shadow-sm" [formGroup]="form" (ngSubmit)="update()">
    <div class="card-body vstack gap-3">
      <input class="form-control" formControlName="name" placeholder="Department name" />
      <textarea class="form-control" formControlName="description" rows="5" placeholder="Description"></textarea>
      <label class="form-check">
        <input class="form-check-input" type="checkbox" formControlName="active" />
        <span class="form-check-label">Active</span>
      </label>

      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit" [disabled]="form.invalid">Update</button>
        <button class="btn btn-outline-danger" type="button" (click)="delete()">Delete</button>
        <a class="btn btn-outline-secondary" routerLink="/departments">Back</a>
      </div>
    </div>
  </form>
} @else {
  <section class="card border-0 shadow-sm">
    <div class="card-body">Department not found.</div>
  </section>
}
