<div class="min-vh-100 d-flex app-surface">
  <aside class="sidebar border-end">
    <div class="d-flex align-items-center gap-2 mb-4">
      <img src="/assets/img/support-ticket.png" alt="Logo" class="brand-logo" />
      <h1 class="h5 mb-0">Support Desk</h1>
    </div>

    <nav class="nav nav-pills flex-column gap-1">
      <a class="nav-link" routerLink="/dashboard">Dashboard</a>
      <a class="nav-link" routerLink="/tickets">Complaints</a>
    </nav>
  </aside>

  <div class="flex-fill">
    <header class="border-bottom px-4 py-3 d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary btn-sm" (click)="themeService.toggle()">
        {{ themeService.isDark() ? 'Light mode' : 'Dark mode' }}
      </button>
      <button type="button" class="btn btn-outline-danger btn-sm" (click)="logout()">Logout</button>
    </header>

    <main class="container-fluid p-4">
      <router-outlet />
    </main>
  </div>
</div>
